{% extends "base.html" %}
{% block title %}Login | EduVault{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="card shadow-lg p-5" style="width: 450px;">

        <div class="text-center mb-4">
            <h2 class="fw-bold">Login to EduVault</h2>
            <p class="text-light">Secure Assignment Portal</p>
        </div>

        <form method="POST">

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-4">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">
                    Login
                </button>
            </div>

        </form>

        <hr>

        <div class="text-center">
            <small>
                Don't have an account?
                <a href="{{ url_for('register') }}" class="text-info fw-bold">
                    Register here
                </a>
            </small>
        </div>

    </div>
</div>
{% endblock %}
